# Ingestion automatique des soumissions de builds : une issue « build-submission » → décodage + validation
# → ajout au catalogue communautaire (src/game/communityBuilds.json) → commit → issue fermée.
# Git reste le store : aucun backend. Le banc d'essai (npm run bench) teste ensuite tout le catalogue.
name: Ingest build submissions

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  issues: write
  actions: write # pour déclencher le workflow de déploiement (workflow_dispatch)

jobs:
  ingest:
    # Signal robuste : un code WIB1 dans le corps (toujours présent dans une vraie soumission) OU le label
    # `build-submission`. On ne dépend PAS du label seul — GitHub ne l'applique que s'il existe déjà.
    if: ${{ contains(github.event.issue.body, 'WIB1:') || contains(join(github.event.issue.labels.*.name, ','), 'build-submission') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ingestion du build
        id: ingest
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: node scripts/ingest-build.mjs

      - name: Commit du catalogue
        if: steps.ingest.outputs.result == 'ok'
        # Le nom vient du TITRE (utilisateur) → passé en env et assaini par le script (pas d'interpolation
        # directe ${{ }} dans le shell, qui serait injectable).
        env:
          BUILD_NAME: ${{ steps.ingest.outputs.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/game/communityBuilds.json
          git commit -m "feat(builds): ajout communautaire « ${BUILD_NAME} » (#${ISSUE_NUMBER})"
          git push

      - name: Régénérer le leaderboard (déploiement)
        # Un push fait avec GITHUB_TOKEN ne déclenche PAS deploy.yml (anti-boucle GitHub). On lance donc
        # explicitement le déploiement : workflow_dispatch EST autorisé avec GITHUB_TOKEN (exception à la règle).
        if: steps.ingest.outputs.result == 'ok'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main

      - name: Réponse à l'issue
        if: always()
        uses: actions/github-script@v7
        # Sorties passées via env (process.env) → jamais interpolées dans le source JS (anti-injection).
        env:
          RESULT: ${{ steps.ingest.outputs.result }}
          MESSAGE: ${{ steps.ingest.outputs.message }}
          BUILD_NAME: ${{ steps.ingest.outputs.name }}
        with:
          script: |
            const r = process.env.RESULT;
            const msg = process.env.MESSAGE || 'code invalide';
            const name = process.env.BUILD_NAME || 'ton build';
            if (r === 'ok') {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number,
                body: `✅ Build « ${name} » ajouté au catalogue communautaire. Merci ! Il est désormais chargeable en jeu et testé par le banc d'essai.` });
              await github.rest.issues.update({ ...context.repo, issue_number: context.issue.number, state: 'closed' });
            } else if (r === 'duplicate') {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body: 'ℹ️ Ce build est déjà dans le catalogue — rien à faire.' });
              await github.rest.issues.update({ ...context.repo, issue_number: context.issue.number, state: 'closed' });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number,
                body: `❌ Soumission non ajoutée : ${msg}. Vérifie d'avoir collé le code complet (\`WIB1:…\`) puis ré-édite l'issue.` });
            }
